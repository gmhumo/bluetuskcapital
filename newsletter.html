<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Form | Bluetusk Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        header {
        background-color: #191a1b;
        color: white;
        padding: 20px 0;
        text-align: center;
        animation: fadeIn 2s ease-in-out;
        }
        header h1 {
        margin: 0;
        padding: 20px;
        animation: slideIn 1.5s ease-in-out;
        }
        nav {
        background-color: #272f37;
        padding: 10px 0;
        text-align: center;
        animation: fadeIn 2.5s ease-in-out;
        }
        nav a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-weight: bold;
        animation: bounceIn 3s ease-in-out;
        }
        nav a:hover {
        text-decoration: underline;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
        }
        @keyframes slideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
        }
        @keyframes bounceIn {
        0% {
            transform: scale(0.5);
            opacity: 0;
        }
        50% {
            transform: scale(1.2);
            opacity: 1;
        }
        100% {
            transform: scale(1);
        }
        }
        @keyframes fadeInUp {
        from {
            transform: translateY(50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
        }
    </style>
</head>
<body>
    <nav>
        <header>
            <h1>BlueTusk | Real Estate</h1>
        </header>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a class="currentPage">Newsletter</a>
            <a href="contact.html">Contact</a>
        </nav>
    </nav>
    <div class="container">
        <h1>JOIN OUR NEWSLETTER</h1>
        <p>Subscribe to our newsletter to receive our latest offers on properties in the market.</p>
        <form id="newsletterForm">
            <label for="name">First Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="name">Last Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="phoneNumber">Phone Number:</label>
            <input type="phone" id="phoneNumber" name="phoneNumber" maxlength="15" required>

            <button type="submit">SUBSCRIBE</button>
        </form>
    </div>

    <script>
        document.getElementById('paygateForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            alert(`Join Our Newletter:\nName: ${name}\nEmail: ${email}\nPhone: $${phoneNumber}`);
        });
    </script>
        <footer>
            <p>
                <script>
                    var theDate = new Date()
                    document.write("&copy; " + theDate.getFullYear())
                    document.write(" - BlueTusk | Last modified: ")
                    var theModifiedDate = new Date(document.lastModified)
                    document.write(theModifiedDate.toDateString())
                </script>
                <br>Powered by "BlueTusk Projects" Web Hosting
            </p>
        </footer>

</body>
</html>
