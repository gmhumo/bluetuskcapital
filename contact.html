<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        color: #333;
    }
    header {
        background-color: #191a1b;
        color: white;
        padding: 20px 0;
        text-align: center;
        animation: fadeIn 2s ease-in-out;
    }
    header h1 {
        margin: 0;
        padding: 20px;
        animation: slideIn 1.5s ease-in-out;
    }
    nav {
        background-color: #272f37;
        padding: 10px 0;
        text-align: center;
        animation: fadeIn 2.5s ease-in-out;
    }
    nav a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-weight: bold;
        animation: bounceIn 3s ease-in-out;
    }
    nav a:hover {
        text-decoration: underline;
    }
    section {
        padding: 20px;
        max-width: 1200px;
        margin: auto;
        background: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 2s ease-in-out;
    }
    footer {
        background-color: #191a1b;
        color: white;
        text-align: center;
        padding: 10px 0;
        margin-top: 20px;
        animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }
    @keyframes slideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    @keyframes bounceIn {
        0% {
            transform: scale(0.5);
            opacity: 0;
        }
        50% {
            transform: scale(1.2);
            opacity: 1;
        }
        100% {
            transform: scale(1);
        }
    }
    @keyframes fadeInUp {
        from {
            transform: translateY(50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>
